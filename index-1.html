<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1e3a8a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Calepinage Pro">
<link rel="manifest" href="manifest.json">
<title>Calepinage Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f1f5f9; color: #1e293b; padding: 12px; }

  .header { background: linear-gradient(135deg, #1e3a8a, #3b82f6); color: #fff; padding: 20px; border-radius: 14px; margin-bottom: 16px; }
  .header h1 { font-size: 1.4em; }
  .header p { opacity: .85; font-size: .9em; margin-top: 4px; }

  .tabs { display: flex; gap: 4px; margin-bottom: 16px; background: #fff; padding: 5px; border-radius: 12px; overflow-x: auto; }
  .tab { flex-shrink: 0; padding: 10px 16px; border: none; background: transparent; border-radius: 8px; font-size: .85em; font-weight: 500; cursor: pointer; white-space: nowrap; color: #64748b; transition: all .2s; }
  .tab:hover { background: #f1f5f9; color: #1e293b; }
  .tab.active { background: #1a56db; color: #fff; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .card { background: #fff; padding: 16px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
  .card h2 { font-size: 1em; color: #1a56db; margin-bottom: 12px; font-weight: 600; }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }

  .field { display: flex; flex-direction: column; gap: 3px; }
  .field label { font-size: .78em; color: #64748b; font-weight: 500; }
  .field input, .field select { padding: 10px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: .9em; transition: border-color .2s; }
  .field input:focus, .field select:focus { outline: none; border-color: #1a56db; }

  .radio-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .radio-label { display: flex; align-items: center; gap: 6px; padding: 9px 14px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: .85em; cursor: pointer; transition: all .2s; }
  .radio-label:has(input:checked) { border-color: #1a56db; background: #eff6ff; color: #1a56db; font-weight: 600; }

  .btn { padding: 11px 20px; border: none; border-radius: 8px; font-size: .9em; font-weight: 600; cursor: pointer; transition: all .2s; }
  .btn-primary { background: #1a56db; color: #fff; }
  .btn-primary:hover { background: #1e40af; }
  .btn-secondary { background: #e2e8f0; color: #475569; }
  .btn-secondary:hover { background: #cbd5e1; }
  .btn-danger { background: #fee2e2; color: #dc2626; border: none; padding: 5px 9px; border-radius: 6px; cursor: pointer; font-size: .8em; }

  .ouv-item { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 10px; background: #f8fafc; border-radius: 8px; margin-bottom: 6px; border: 1px solid #e2e8f0; }
  .ouv-item select { padding: 6px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: .82em; }
  .ouv-item .lbl { font-size: .75em; color: #94a3b8; }
  .ouv-item input { width: 64px; padding: 6px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: .82em; }

  .result-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
  .result-card { text-align: center; background: linear-gradient(135deg, #eff6ff, #f0f9ff); padding: 12px 8px; border-radius: 10px; border: 1px solid #dbeafe; }
  .result-card h3 { font-size: .75em; color: #64748b; margin-bottom: 4px; }
  .result-card .val { font-size: 1.3em; font-weight: 700; color: #1a56db; }

  .viz-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
  .legend { display: flex; gap: 10px; flex-wrap: wrap; font-size: .78em; margin-top: 6px; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .leg-box { width: 13px; height: 13px; border-radius: 3px; border: 1px solid rgba(0,0,0,.1); }

  .canvas-wrap { background: #fff; border-radius: 10px; border: 1px solid #e2e8f0; overflow: auto; padding: 8px; }
  canvas { display: block; max-width: 100%; }

  table { width: 100%; border-collapse: collapse; font-size: .85em; }
  th { background: #1a56db; color: #fff; padding: 9px 10px; text-align: left; font-weight: 600; }
  td { padding: 8px 10px; border-bottom: 1px solid #f1f5f9; }
  tr:hover td { background: #f8fafc; }
  .sep-row td { background: #e2e8f0; font-weight: 600; font-size: .8em; color: #475569; padding: 5px 10px; }
  .total-row td { font-weight: 700; background: #eff6ff; border-top: 2px solid #1a56db; }

  .empty { color: #94a3b8; font-size: .85em; font-style: italic; }
  .actions { display: flex; gap: 8px; margin-top: 12px; }

  .btn-success { background: #16a34a; color: #fff; }
  .btn-success:hover { background: #15803d; }
  .btn-warn { background: #f59e0b; color: #fff; }
  .btn-warn:hover { background: #d97706; }
  .projet-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 10px 20px; border-radius: 10px; font-size: .85em; z-index: 999; opacity: 0; transition: opacity .3s; pointer-events: none; }
  .toast.show { opacity: 1; }

  .facade-card { background: #fff; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.07); overflow: hidden; border: 2px solid #e2e8f0; }
  .facade-card.active-facade { border-color: #1a56db; }
  .facade-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; cursor: pointer; background: #f8fafc; }
  .facade-header:hover { background: #eff6ff; }
  .facade-title { font-weight: 700; font-size: .95em; color: #1e293b; flex: 1; }
  .facade-badge { font-size: .75em; color: #64748b; background: #e2e8f0; padding: 2px 8px; border-radius: 20px; }
  .facade-badge.ok { background: #dcfce7; color: #16a34a; }
  .facade-body { display: none; padding: 12px 16px; border-top: 1px solid #e2e8f0; }
  .facade-body.open { display: block; }
  .facade-actions { display: flex; gap: 6px; margin-top: 10px; }
  .btn-sm { padding: 6px 12px; font-size: .8em; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
  .btn-calc-facade { background: #1a56db; color: #fff; }
  .btn-del-facade { background: #fee2e2; color: #dc2626; }
  .add-facade-bar { display: flex; gap: 8px; margin-bottom: 12px; }
  .total-card { background: linear-gradient(135deg, #1e3a8a, #3b82f6); color: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .total-card h2 { font-size: 1em; margin-bottom: 10px; opacity: .9; }
  .total-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .total-item { text-align: center; background: rgba(255,255,255,.15); border-radius: 8px; padding: 8px; }
  .total-item .tval { font-size: 1.2em; font-weight: 700; }
  .total-item .tlbl { font-size: .72em; opacity: .85; margin-top: 2px; }

  @media (max-width: 500px) {
    .grid2, .grid3 { grid-template-columns: 1fr; }
    .result-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>🏗️ Calepinage Pro</h1>
  <p>Bardage &amp; Panneaux — Calcul et plan de pose</p>
</div>

<div class="tabs">
  <button class="tab active" data-tab="saisie">📐 Saisie</button>
  <button class="tab" data-tab="visu">🎨 Visu 2D</button>
  <button class="tab" data-tab="metre">📊 Métré</button>
</div>

<!-- ===== SAISIE ===== -->
<div id="tab-saisie" class="tab-content active">

  <div class="add-facade-bar">
    <button class="btn btn-primary" id="btnAddFacade">+ Ajouter une façade</button>
    <button class="btn btn-primary" id="btnCalcAll">🔍 Tout calculer</button>
  </div>

  <div id="listeFacades"></div>

  <div class="projet-bar" style="margin-top:12px">
    <button class="btn btn-success" id="btnSauv">💾 Sauvegarder projet</button>
    <button class="btn btn-warn" id="btnCharg">📂 Charger projet</button>
    <input type="file" id="fileCharg" accept=".json" style="display:none">
  </div>
</div>

<!-- ===== VISU ===== -->
<div id="tab-visu" class="tab-content">
  <div class="viz-header">
    <div>
      <strong>🎨 Plan de calepinage</strong>
      <div class="legend">
        <span class="legend-item"><span class="leg-box" style="background:#86efac"></span> Entière</span>
        <span class="legend-item"><span class="leg-box" style="background:#fbbf24"></span> Découpée</span>
        <span class="legend-item"><span class="leg-box" style="background:#fca5a5"></span> Chute</span>
        <span class="legend-item"><span class="leg-box" style="background:#94a3b8"></span> Ouverture</span>
        <span class="legend-item"><span class="leg-box" style="background:#d1d5db"></span> Anti-rongeur</span>
      </div>
    </div>
    <button class="btn btn-primary" id="btnPDF">📄 Exporter PDF</button>
  </div>
  <div class="field" style="margin-bottom:10px">
    <label style="font-size:.78em;color:#64748b;font-weight:500">Façade affichée</label>
    <select id="selectVisu" style="padding:10px;border:2px solid #e2e8f0;border-radius:8px;font-size:.9em;width:100%">
      <option value="">— Aucune façade calculée —</option>
    </select>
  </div>
  <div class="canvas-wrap">
    <canvas id="cvs"></canvas>
  </div>
</div>

<!-- ===== METRE ===== -->
<div id="tab-metre" class="tab-content">
  <div id="totalGeneral"></div>
  <div id="tableauMetre"><p class="empty">Calculez d'abord le calepinage</p></div>
</div>

  <script>
// ============================================================
//  STATE MULTI-FAÇADES
// ============================================================
var facades = []; // liste des façades
var resFacades = []; // résultats calculés par façade
var currentVisu = 0; // index façade affichée en visu
var facadeCounter = 0;

// ============================================================
//  TABS
// ============================================================
document.querySelectorAll('.tab').forEach(function(t) {
  t.addEventListener('click', function() {
    var id = this.dataset.tab;
    document.querySelectorAll('.tab').forEach(function(x){ x.classList.remove('active'); });
    document.querySelectorAll('.tab-content').forEach(function(x){ x.classList.remove('active'); });
    this.classList.add('active');
    document.getElementById('tab-' + id).classList.add('active');
    if (id === 'visu' && resFacades.length > 0) {
      updateSelectVisu();
      dessiner(resFacades[currentVisu]);
    }
  });
});

// ============================================================
//  GESTION FAÇADES
// ============================================================
function nomFacade(f) {
  return f.nom || ('Façade ' + f.num);
}

function newFacade() {
  facadeCounter++;
  return {
    id: Date.now(),
    num: facadeCounter,
    nom: '',
    type: 'facade',
    larg: 8000, largHG: 8000, largHD: 8000,
    hg: 4000, hd: 4000, hc: 6000,
    ouvertures: [],
    typeMat: 'composite',
    lu: 200, hu: 3000, joint: 8,
    lameAir: 25, antiRongeur: 300,
    formatPP: '25', zoneVent: 'normale', coteVent: 'gauche'
  };
}

function renderFacades() {
  var c = document.getElementById('listeFacades');
  if (facades.length === 0) {
    c.innerHTML = '<p class="empty" style="padding:16px">Aucune façade — cliquez "+ Ajouter une façade"</p>';
    return;
  }
  c.innerHTML = '';
  facades.forEach(function(f, idx) {
    var r = resFacades[idx];
    var badge = r ? ('<span class="facade-badge ok">✓ ' + r.sBrute.toFixed(1) + ' m²</span>') : '<span class="facade-badge">Non calculé</span>';
    var div = document.createElement('div');
    div.className = 'facade-card' + (idx === 0 ? ' active-facade' : '');
    div.innerHTML =
      '<div class="facade-header" data-idx="' + idx + '">' +
        '<span class="facade-title">' + nomFacade(f) + '</span>' +
        badge +
        '<span style="color:#94a3b8;font-size:1.1em" data-arrow="' + idx + '">▼</span>' +
      '</div>' +
      '<div class="facade-body' + (idx === 0 ? ' open' : '') + '" id="fb_' + idx + '">' +
        renderFacadeForm(f, idx) +
      '</div>';
    c.appendChild(div);
  });

  // Listeners accordion
  c.querySelectorAll('.facade-header').forEach(function(h) {
    h.addEventListener('click', function() {
      var i = parseInt(this.dataset.idx);
      var body = document.getElementById('fb_' + i);
      var isOpen = body.classList.contains('open');
      c.querySelectorAll('.facade-body').forEach(function(b){ b.classList.remove('open'); });
      c.querySelectorAll('.facade-card').forEach(function(b){ b.classList.remove('active-facade'); });
      if (!isOpen) {
        body.classList.add('open');
        h.closest('.facade-card').classList.add('active-facade');
      }
    });
  });

  // Listeners champs
  facades.forEach(function(f, idx) {
    bindFacadeForm(f, idx);
  });
}

function renderFacadeForm(f, idx) {
  return '<div class="field" style="margin-bottom:10px"><label>Nom de la façade</label>' +
    '<input type="text" data-fid="' + f.id + '" data-ff="nom" value="' + (f.nom||'') + '" placeholder="Ex: Façade Nord, Pignon Est...">' +
    '</div>' +

    '<div style="margin-bottom:10px"><strong style="font-size:.85em;color:#64748b">TYPE</strong><br>' +
    '<div class="radio-group" style="margin-top:6px">' +
    ['facade','pignon'].map(function(v) {
      var lbl = v === 'facade' ? 'Façade' : 'Pignon';
      return '<label class="radio-label"><input type="radio" name="stype_' + idx + '" value="' + v + '"' + (f.type===v?' checked':'') + '> ' + lbl + '</label>';
    }).join('') +
    '</div></div>' +

    '<div class="grid2" style="margin-bottom:10px">' +
    '<div class="field"><label>Largeur bas (mm)</label><input type="number" data-fid="' + f.id + '" data-ff="larg" value="' + f.larg + '" min="1"></div>' +
    '<div class="field" id="fLHG_' + idx + '" style="display:' + (f.type==='pignon'?'block':'none') + '"><label>Largeur haut G (mm)</label><input type="number" data-fid="' + f.id + '" data-ff="largHG" value="' + f.largHG + '" min="0"></div>' +
    '<div class="field" id="fLHD_' + idx + '" style="display:' + (f.type==='pignon'?'block':'none') + '"><label>Largeur haut D (mm)</label><input type="number" data-fid="' + f.id + '" data-ff="largHD" value="' + f.largHD + '" min="0"></div>' +
    '<div class="field"><label>Hauteur gauche (mm)</label><input type="number" data-fid="' + f.id + '" data-ff="hg" value="' + f.hg + '" min="1"></div>' +
    '<div class="field"><label>Hauteur droite (mm)</label><input type="number" data-fid="' + f.id + '" data-ff="hd" value="' + f.hd + '" min="1"></div>' +
    '<div class="field" id="fHC_' + idx + '" style="display:' + (f.type==='pignon'?'block':'none') + '"><label>Hauteur pointe (mm)</label><input type="number" data-fid="' + f.id + '" data-ff="hc" value="' + f.hc + '" min="1"></div>' +
    '</div>' +

    '<strong style="font-size:.85em;color:#64748b">MATÉRIAU</strong>' +
    '<div class="grid2" style="margin-top:6px;margin-bottom:10px">' +
    '<div class="field"><label>Type</label><select data-fid="' + f.id + '" data-ff="typeMat">' +
    ['composite','fibrociment','metal'].map(function(v){ return '<option value="' + v + '"' + (f.typeMat===v?' selected':'') + '>' + v.charAt(0).toUpperCase()+v.slice(1) + '</option>'; }).join('') +
    '</select></div>' +
    '<div class="field"><label>Largeur lame (mm)</label><input type="number" data-fid="' + f.id + '" data-ff="lu" value="' + f.lu + '" min="1"></div>' +
    '<div class="field"><label>Longueur lame (mm)</label><input type="number" data-fid="' + f.id + '" data-ff="hu" value="' + f.hu + '" min="1"></div>' +
    '<div class="field"><label>Joint (mm)</label><input type="number" data-fid="' + f.id + '" data-ff="joint" value="' + f.joint + '" min="0"></div>' +
    '</div>' +

    '<strong style="font-size:.85em;color:#64748b">ACCESSOIRES</strong>' +
    '<div class="grid2" style="margin-top:6px;margin-bottom:10px">' +
    '<div class="field"><label>Lame d\'air (mm)</label><input type="number" data-fid="' + f.id + '" data-ff="lameAir" value="' + f.lameAir + '" min="0"></div>' +
    '<div class="field"><label>Anti-rongeur (mm)</label><input type="number" data-fid="' + f.id + '" data-ff="antiRongeur" value="' + f.antiRongeur + '" min="0"></div>' +
    '<div class="field"><label>Rouleau PP</label><select data-fid="' + f.id + '" data-ff="formatPP">' +
    ['10','25','50'].map(function(v){ return '<option value="' + v + '"' + (f.formatPP===v?' selected':'') + '>' + v + ' ml</option>'; }).join('') +
    '</select></div>' +
    '<div class="field"><label>Zone vent</label><select data-fid="' + f.id + '" data-ff="zoneVent">' +
    '<option value="normale"' + (f.zoneVent==='normale'?' selected':'') + '>Normale</option>' +
    '<option value="forte"' + (f.zoneVent==='forte'?' selected':'') + '>Forte</option>' +
    '</select></div>' +
    '<div class="field" id="fCoteVent_' + idx + '" style="display:' + (f.typeMat==='metal'?'block':'none') + '"><label>Côté vent</label>' +
    '<select data-fid="' + f.id + '" data-ff="coteVent">' +
    '<option value="gauche"' + (f.coteVent==='gauche'?' selected':'') + '>Vent gauche → G→D</option>' +
    '<option value="droite"' + (f.coteVent==='droite'?' selected':'') + '>Vent droite → D→G</option>' +
    '</select></div>' +
    '</div>' +

    '<strong style="font-size:.85em;color:#64748b">OUVERTURES</strong>' +
    '<div id="listeOuv_' + idx + '" style="margin-top:6px">' + renderOuvHTML(f.ouvertures, idx) + '</div>' +
    '<button class="btn btn-secondary btn-sm" data-addouv="' + idx + '" style="margin-top:8px">+ Ouverture</button>' +

    '<div class="facade-actions">' +
    '<button class="btn-sm btn-calc-facade" data-calc="' + idx + '">🔍 Calculer</button>' +
    '<button class="btn-sm" style="background:#eff6ff;color:#1a56db" data-visu="' + idx + '">🎨 Visu</button>' +
    '<button class="btn-sm btn-del-facade" data-del="' + idx + '">🗑️ Supprimer</button>' +
    '</div>';
}

function renderOuvHTML(ouvs, idx) {
  if (!ouvs || ouvs.length === 0) return '<p class="empty">Aucune ouverture</p>';
  return ouvs.map(function(o) {
    return '<div class="ouv-item">' +
      '<select data-oidx="' + idx + '" data-oid="' + o.id + '" data-of="type">' +
      '<option value="fenetre"' + (o.type==='fenetre'?' selected':'') + '>Fenêtre</option>' +
      '<option value="porte"' + (o.type==='porte'?' selected':'') + '>Porte</option>' +
      '</select>' +
      '<span class="lbl">X</span><input type="number" value="' + o.x + '" data-oidx="' + idx + '" data-oid="' + o.id + '" data-of="x">' +
      '<span class="lbl">Y</span><input type="number" value="' + o.y + '" data-oidx="' + idx + '" data-oid="' + o.id + '" data-of="y">' +
      '<span class="lbl">L</span><input type="number" value="' + o.larg + '" data-oidx="' + idx + '" data-oid="' + o.id + '" data-of="larg">' +
      '<span class="lbl">H</span><input type="number" value="' + o.haut + '" data-oidx="' + idx + '" data-oid="' + o.id + '" data-of="haut">' +
      '<button class="btn-danger" data-deloidx="' + idx + '" data-deloid="' + o.id + '">🗑️</button>' +
      '</div>';
  }).join('');
}

function bindFacadeForm(f, idx) {
  var body = document.getElementById('fb_' + idx);
  if (!body) return;

  // Champs texte/number/select
  body.querySelectorAll('[data-ff]').forEach(function(el) {
    el.addEventListener('change', function() {
      var fid = parseInt(this.dataset.fid);
      var ff = this.dataset.ff;
      var fac = facades.find(function(x){ return x.id === fid; });
      if (!fac) return;
      fac[ff] = (el.tagName === 'SELECT' || ff === 'nom') ? this.value : (parseFloat(this.value) || 0);
      // Afficher/masquer champs selon type
      if (ff === 'type') {
        document.getElementById('fHC_' + idx).style.display  = this.value === 'pignon' ? 'block' : 'none';
        document.getElementById('fLHG_' + idx).style.display = this.value === 'pignon' ? 'block' : 'none';
        document.getElementById('fLHD_' + idx).style.display = this.value === 'pignon' ? 'block' : 'none';
      }
      if (ff === 'typeMat') {
        var cv = document.getElementById('fCoteVent_' + idx);
        if (cv) cv.style.display = this.value === 'metal' ? 'block' : 'none';
      }
    });
  });

  // Radio type surface
  body.querySelectorAll('input[type="radio"]').forEach(function(r) {
    r.addEventListener('change', function() {
      var fid = facades[idx].id;
      var fac = facades.find(function(x){ return x.id === fid; });
      if (!fac) return;
      fac.type = this.value;
      document.getElementById('fHC_' + idx).style.display  = this.value === 'pignon' ? 'block' : 'none';
      document.getElementById('fLHG_' + idx).style.display = this.value === 'pignon' ? 'block' : 'none';
      document.getElementById('fLHD_' + idx).style.display = this.value === 'pignon' ? 'block' : 'none';
    });
  });

  // Ouvertures
  var btnAddOuv = body.querySelector('[data-addouv]');
  if (btnAddOuv) {
    btnAddOuv.addEventListener('click', function() {
      var i = parseInt(this.dataset.addouv);
      facades[i].ouvertures.push({ id: Date.now(), type: 'fenetre', x: 500, y: 500, larg: 1200, haut: 1500 });
      document.getElementById('listeOuv_' + i).innerHTML = renderOuvHTML(facades[i].ouvertures, i);
      bindOuvListeners(i);
    });
  }
  bindOuvListeners(idx);

  // Bouton calculer
  var btnCalc = body.querySelector('[data-calc]');
  if (btnCalc) {
    btnCalc.addEventListener('click', function() {
      var i = parseInt(this.dataset.calc);
      resFacades[i] = calculerFacade(facades[i]);
      currentVisu = i;
      renderFacades();
      afficherMetreTotal();
      updateSelectVisu();
      showToast('✓ ' + nomFacade(facades[i]) + ' calculée');
    });
  }

  // Bouton visu
  var btnVisu = body.querySelector('[data-visu]');
  if (btnVisu) {
    btnVisu.addEventListener('click', function() {
      var i = parseInt(this.dataset.visu);
      if (!resFacades[i]) { resFacades[i] = calculerFacade(facades[i]); }
      currentVisu = i;
      updateSelectVisu();
      document.querySelectorAll('.tab').forEach(function(x){ x.classList.remove('active'); });
      document.querySelectorAll('.tab-content').forEach(function(x){ x.classList.remove('active'); });
      document.querySelector('[data-tab="visu"]').classList.add('active');
      document.getElementById('tab-visu').classList.add('active');
      dessiner(resFacades[i]);
    });
  }

  // Bouton supprimer
  var btnDel = body.querySelector('[data-del]');
  if (btnDel) {
    btnDel.addEventListener('click', function() {
      var i = parseInt(this.dataset.del);
      if (confirm('Supprimer ' + nomFacade(facades[i]) + ' ?')) {
        facades.splice(i, 1);
        resFacades.splice(i, 1);
        renderFacades();
        afficherMetreTotal();
      }
    });
  }
}

  var body = document.getElementById('listeOuv_' + idx);
  if (!body) return;
  body.querySelectorAll('[data-of]').forEach(function(el) {
    el.addEventListener('change', function() {
      var oidx = parseInt(this.dataset.oidx);
      var oid  = parseInt(this.dataset.oid);
      var of   = this.dataset.of;
      var ouv  = facades[oidx].ouvertures.find(function(o){ return o.id === oid; });
      if (!ouv) return;
      ouv[of] = of === 'type' ? this.value : (parseFloat(this.value) || 0);
    });
  });
  body.querySelectorAll('[data-deloid]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var oidx = parseInt(this.dataset.deloidx);
      var oid  = parseInt(this.dataset.deloid);
      facades[oidx].ouvertures = facades[oidx].ouvertures.filter(function(o){ return o.id !== oid; });
      document.getElementById('listeOuv_' + oidx).innerHTML = renderOuvHTML(facades[oidx].ouvertures, oidx);
      bindOuvListeners(oidx);
    });
  });
}

// ============================================================
//  CALCUL PAR FAÇADE
// ============================================================
function calculerFacade(f) {
  var type   = f.type;
  var larg   = f.larg || 0;
  var hgVal  = f.hg || 0;
  var hdVal  = f.hd || 0;
  var hcVal  = type === 'pignon' ? (f.hc || 0) : hgVal;
  var largHG = type === 'pignon' ? (f.largHG || larg) : larg;
  var largHD = type === 'pignon' ? (f.largHD || larg) : larg;
  var lu     = f.lu || 1;
  var hu     = f.hu || 1;
  var joint  = f.joint || 0;
  var lAir   = f.lameAir || 0;
  var arH    = f.antiRongeur || 0;
  var zVent  = f.zoneVent || 'normale';
  var ouvertures = f.ouvertures || [];

  // Surface brute
  var sBrute;
  if (type === 'facade') {
    sBrute = (larg * ((hgVal + hdVal) / 2)) / 1e6;
  } else {
    // pignon : plat G (0..largHG a hg), pente G->pointe, pente->plat D, plat D (larg-largHD..larg a hd)
    // La pointe est a xPointe = larg/2 (centre) ou calculee depuis largHG/largHD
    // Surface = rect plat G + triangle G + triangle D + rect plat D
    var xPointe = larg / 2; // pointe au centre
    var wPlatG  = largHG;
    var wPlatD  = largHD;
    var sRectG  = (wPlatG * hgVal) / 1e6;
    var sTriG   = ((xPointe - wPlatG) * (hgVal + hcVal) / 2) / 1e6;
    var sTriD   = ((larg - wPlatD - xPointe) * (hdVal + hcVal) / 2) / 1e6;
    var sRectD  = (wPlatD * hdVal) / 1e6;
    sBrute = sRectG + sTriG + sTriD + sRectD;
  }

  var sOuv = ouvertures.reduce(function(acc, o){ return acc + (o.larg * o.haut) / 1e6; }, 0);
  var hPose = Math.max(0, Math.min(hgVal, hdVal) - arH);
  var sUtile = Math.max(0, (larg * hPose) / 1e6 - sOuv);

  // Lames
  var coeffChuteMat = { composite: 0.05, fibrociment: 0.07, metal: 0.03 };
  var coeffMat = coeffChuteMat[f.typeMat] || 0.05;
  var nbTotal = 0, sAchetee = 0, sChuteGeo = 0;
  var hMinP2 = Math.min(hgVal, hdVal);
  var hTotPose2 = (type === 'pignon') ? (hcVal - arH) : (Math.max(hgVal, hdVal) - arH);
  var nbRTot2 = Math.ceil(hTotPose2 / (lu + joint));

  for (var rr = 0; rr < nbRTot2; rr++) {
    var yMidR = arH + (rr + 0.5) * (lu + joint);
    var largR;
    if (type === 'facade') {
      largR = larg;
    } else {
      // pignon : plat G (0..largHG), pente vers pointe au centre, pente vers plat D (larg-largHD..larg)
      var xPtr = larg / 2;
      var xLeft, xRight;
      // Bord gauche de la lame
      if (yMidR <= hgVal) {
        xLeft = 0; // dans le plat G
      } else {
        // interpolation lineaire entre bas du plat G (x=largHG, y=hg) et pointe (x=xPtr, y=hc)
        var progG2 = Math.min((yMidR - hgVal) / (hcVal - hgVal), 1);
        xLeft = largHG + (xPtr - largHG) * progG2;
      }
      // Bord droit de la lame
      if (yMidR <= hdVal) {
        xRight = larg; // dans le plat D
      } else {
        var progD2 = Math.min((yMidR - hdVal) / (hcVal - hdVal), 1);
        xRight = (larg - largHD) - ((larg - largHD) - xPtr) * progD2;
      }
      largR = Math.max(0, xRight - xLeft);
    }
    if (largR <= 10) continue;
    var nbL = Math.ceil(largR / hu);
    nbTotal += nbL;
    sAchetee += (nbL * lu * hu) / 1e6;
    sChuteGeo += ((nbL * hu - largR) * lu) / 1e6;
    var yBotR = arH + rr * (lu + joint);
    var yTopR = yBotR + lu;
    ouvertures.forEach(function(o) {
      if (o.y < yTopR && (o.y + o.haut) > yBotR) {
        sChuteGeo += (Math.min(yTopR, o.y+o.haut) - Math.max(yBotR, o.y)) * o.larg / 1e6;
      }
    });
  }

  var tauxChute = (sAchetee > 0 ? (sChuteGeo / sAchetee * 100) : 0) + coeffMat * 100;

  // Ossature
  var espMontant = lAir <= 20 ? 400 : (lAir <= 30 ? 500 : 600);
  var nbMontants = Math.ceil(larg / espMontant) + 1;
  var nbMontants3m = nbMontants * Math.ceil(hPose / 3000);
  var nbEquerres = nbMontants * 4;

  // Vis
  var nbVis;
  if (f.typeMat === 'metal') {
    nbVis = Math.ceil(sUtile * 3);
  } else {
    nbVis = Math.ceil(nbTotal * Math.ceil(hu / 500) * nbMontants);
  }

  // Finitions
  var tpsMin = sBrute * 1, tpsMax = sBrute * 1.5;
  var nbAR = Math.ceil(larg / 3000);
  var formatPP = parseFloat(f.formatPP) || 25;
  var nbRouleaux = Math.ceil(sBrute / (1.5 * formatPP));
  var nbJD = f.typeMat === 'metal' ? 0 : Math.floor(larg / 6000);
  var mlJD = nbJD * (hPose / 1000);
  var coteVent = f.coteVent || 'gauche';
  var sensePose = f.typeMat === 'metal'
    ? (coteVent === 'gauche' ? 'G→D (joint côté terre D)' : 'D→G (joint côté terre G)')
    : 'Bords → Centre (symétrique)';

  return {
    nom: f.nom || ('Façade ' + f.num),
    type, larg, largHG, largHD, hg: hgVal, hd: hdVal, hc: hcVal,
    lu, hu, joint, arH, hPose, lAir, zVent,
    typeMat: f.typeMat, sensePose, formatPP,
    sBrute, sOuv, sUtile, sAchetee, tauxChute,
    nbTotal, nbMontants, nbMontants3m, nbEquerres, nbAR,
    nbVis, nbRouleaux, nbJD, mlJD,
    tpsMin, tpsMax,
    joursMin: Math.ceil(tpsMin/8), joursMax: Math.ceil(tpsMax/8),
    ouvertures: ouvertures
  };
}

function afficherMetreTotal() {
  var calc = resFacades.filter(Boolean);
  if (calc.length === 0) {
    document.getElementById('totalGeneral').innerHTML = '';
    document.getElementById('tableauMetre').innerHTML = '<p class="empty">Calculez d\'abord le calepinage</p>';
    return;
  }

  // Totaux
  var totBrute = 0, totUtile = 0, totLames = 0, totVis = 0, totEquerres = 0, totMontants = 0, totAR = 0, totPP = 0, totTpsMin = 0, totTpsMax = 0;
  calc.forEach(function(r) {
    totBrute    += r.sBrute;
    totUtile    += r.sUtile;
    totLames    += r.nbTotal;
    totVis      += r.nbVis;
    totEquerres += r.nbEquerres;
    totMontants += r.nbMontants3m;
    totAR       += r.nbAR;
    totPP       += r.nbRouleaux;

    '<div class="total-item"><div class="tval">' + totMontants + ' u</div><div class="tlbl">Montants 3m</div></div>' +
    '<div class="total-item"><div class="tval">' + totEquerres + ' u</div><div class="tlbl">Équerres</div></div>' +
    '<div class="total-item"><div class="tval">' + totTpsMin.toFixed(0) + 'h–' + totTpsMax.toFixed(0) + 'h</div><div class="tlbl">Temps estimé</div></div>' +

  document.getElementById('totalGeneral').innerHTML = tcHtml;

  // Détail par façade
  var html = '';

    html += '<div class="card" style="margin-bottom:10px">';

    html += '<tr class="total-row"><td>Surface utile</td><td>' + r.sUtile.toFixed(2) + ' m²</td></tr>';
    html += '<tr class="sep-row"><td colspan="2">Lames ' + r.typeMat + ' ' + r.hu + 'mm</td></tr>';
    html += '<tr><td>Nombre de lames</td><td>' + r.nbTotal + ' u</td></tr>';
    html += '<tr><td>Taux de chute</td><td>' + r.tauxChute.toFixed(1) + '%</td></tr>';
    html += '<tr><td>Sens de pose</td><td>' + r.sensePose + '</td></tr>';
    html += '<tr class="sep-row"><td colspan="2">Ossature</td></tr>';
    html += '<tr><td>Montants 3m</td><td>' + r.nbMontants3m + ' u (' + r.nbMontants + ' files)</td></tr>';
    html += '<tr><td>Équerres (4/montant)</td><td>' + r.nbEquerres + ' u</td></tr>';
    html += '<tr><td>Vis</td><td>' + r.nbVis + ' u</td></tr>';
    html += '<tr class="sep-row"><td colspan="2">Finitions</td></tr>';
    html += '<tr><td>Anti-rongeur (bas)</td><td>' + r.nbAR + ' u</td></tr>';
    html += '<tr><td>Pare-pluie (' + r.formatPP + 'ml × 1.5m)</td><td>' + r.nbRouleaux + ' rouleau' + (r.nbRouleaux > 1 ? 'x' : '') + '</td></tr>';

    html += '<tr class="sep-row"><td colspan="2">Temps de pose</td></tr>';

    html += '<tr><td>Jours (base 8h)</td><td>' + r.joursMin + 'j – ' + r.joursMax + 'j</td></tr>';
    html += '</tbody></table></div>';
  });

  // Ligne totaux
  html += '<div class="card"><table><thead><tr><th colspan="2">🔢 RÉCAP TOTAL</th></tr></thead><tbody>';
  html += '<tr class="total-row"><td>Surface brute totale</td><td>' + totBrute.toFixed(2) + ' m²</td></tr>';
  html += '<tr class="total-row"><td>Surface utile totale</td><td>' + totUtile.toFixed(2) + ' m²</td></tr>';

  html += '<tr class="total-row"><td>Pare-pluie total</td><td>' + totPP + ' rouleau' + (totPP > 1 ? 'x' : '') + '</td></tr>';
  html += '<tr class="total-row"><td>Temps total</td><td>' + totTpsMin.toFixed(0) + 'h – ' + totTpsMax.toFixed(0) + 'h (' + Math.ceil(totTpsMin/8) + 'j – ' + Math.ceil(totTpsMax/8) + 'j)</td></tr>';
  html += '</tbody></table></div>';

  document.getElementById('tableauMetre').innerHTML = html;
}

// ============================================================
//  DESSIN CANVAS
// ============================================================
function dessiner(res) {
  if (!res) return;
  var canvas = document.getElementById('cvs');
  var wrap   = canvas.parentElement;
  var W      = Math.max(wrap.clientWidth - 16, 300);

  var hauteurTotale = res.type === 'pignon'
    ? Math.max(res.hg, res.hd, res.hc)
    : Math.max(res.hg, res.hd);

  var scale = (W - 60) / res.larg;
  var H     = Math.min(hauteurTotale * scale + 60, 700);

  canvas.width  = W;
  canvas.height = H;

  var ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  // --- Marges ---
  var mL = 30, mT = 20, mB = 30;
  var sc = scale;

  // --- Hauteurs en px ---
  var arPx   = res.arH * sc;
  var posePx = res.hPose * sc;
  var hgPx   = res.hg * sc;
  var hdPx   = res.hd * sc;
  var hcPx   = res.type === 'pignon' ? res.hc * sc : 0;
  var largPx = res.larg * sc;

  var yBase  = H - mB;
  var yPoseTop = yBase - arPx - posePx;

  // --- FOND BLANC ---
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, W, H);

  // --- ANTI-RONGEUR ---
  if (res.arH > 0) {
    ctx.fillStyle = '#d1d5db';
    ctx.fillRect(mL, yBase - arPx, largPx, arPx);
    ctx.fillStyle = '#6b7280';
    ctx.font = '10px sans-serif';
    ctx.fillText('Anti-rongeur ' + res.arH + 'mm', mL + 6, yBase - 4);
  }

  var hR = (res.lu + res.joint) * sc;
  var lP = res.hu * sc;

  // --- CLIP GLOBAL : forme totale du pignon ou facade ---
  ctx.save();
  ctx.beginPath();
  if (res.type === 'facade') {
    ctx.moveTo(mL,          yBase - hgPx);
    ctx.lineTo(mL + largPx, yBase - hdPx);
    ctx.lineTo(mL + largPx, yBase - arPx);
    ctx.lineTo(mL,          yBase - arPx);
  } else {
    // pignon : plat G -> pente -> pointe -> pente -> plat D
    var xPtrPx = largPx / 2;
    var xPlatGpx = res.largHG * sc;
    var xPlatDpx = (res.larg - res.largHD) * sc;
    ctx.moveTo(mL,           yBase - res.hg * sc);
    if (res.largHG > 0) ctx.lineTo(mL + xPlatGpx, yBase - res.hg * sc);
    ctx.lineTo(mL + xPtrPx,  yBase - res.hc * sc);
    if (res.largHD > 0) ctx.lineTo(mL + xPlatDpx, yBase - res.hd * sc);
    if (res.largHD > 0) ctx.lineTo(mL + largPx,  yBase - res.hd * sc);
    ctx.lineTo(mL + largPx,  yBase - arPx);
    ctx.lineTo(mL,            yBase - arPx);
  }
  ctx.closePath();
  ctx.clip();

  // --- LAMES : de bas en haut, le clip fait le masquage ---
  var hautTotLames = res.type === 'pignon'
    ? (res.hc - res.arH)
    : (Math.max(res.hg, res.hd) - res.arH);
  // Pignon : même logique que facade pour la hauteur totale
  var nbRTotal = Math.ceil(hautTotLames / (res.lu + res.joint));

  // PASS 1 : remplissage couleur (sans bordure)
  for (var i = 0; i < nbRTotal; i++) {
    var yLame = yBase - arPx - (i + 1) * hR;
    var hLame = hR - res.joint * sc;
    if (hLame <= 0 || yLame + hLame < mT) continue;
    var nbLamesRow = Math.ceil(largPx / lP) + 2;
    for (var j = 0; j < nbLamesRow; j++) {
      var xLame = mL + j * lP;
      var wLame = Math.min(lP, mL + largPx - xLame);
      if (wLame < 2) continue;
      var ratio = wLame / lP;
      if (ratio >= 0.95) ctx.fillStyle = '#86efac88';
      else if (ratio > 0.05) ctx.fillStyle = '#fbbf2488';
      else ctx.fillStyle = '#fca5a588';
      var isOuv = false;
      res.ouvertures.forEach(function(o) {
        var ox = mL + o.x * sc, ow = o.larg * sc;
        var oy = yBase - (o.y + o.haut) * sc, oh = o.haut * sc;
        if (xLame < ox + ow && xLame + wLame > ox && yLame < oy + oh && yLame + hLame > oy) isOuv = true;
      });
      if (isOuv) ctx.fillStyle = '#94a3b855';
      ctx.fillRect(xLame, yLame, wLame, hLame);
    }
  }
  // PASS 2 : grille (une ligne par rangee et par colonne, pas de doublon)
  ctx.strokeStyle = '#94a3b866';
  ctx.lineWidth = 0.5;
  var nbCols = Math.ceil(largPx / lP);
  ctx.beginPath();
  for (var c = 1; c < nbCols; c++) {
    var xCol = mL + c * lP;
    ctx.moveTo(xCol, yBase - arPx - nbRTotal * hR);
    ctx.lineTo(xCol, yBase - arPx);
  }
  for (var i2 = 1; i2 < nbRTotal; i2++) {
    var yRow = yBase - arPx - i2 * hR;
    ctx.moveTo(mL, yRow);
    ctx.lineTo(mL + largPx, yRow);
  }
  ctx.stroke();

  ctx.restore();

  // --- OUVERTURES ---
  res.ouvertures.forEach(function(o) {
    var ox = mL + o.x * sc;
    var ow = o.larg * sc;
    var oy = yBase - (o.y + o.haut) * sc;
    var oh = o.haut * sc;
    ctx.fillStyle = '#94a3b8aa';
    ctx.fillRect(ox, oy, ow, oh);
    ctx.strokeStyle = '#475569';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(ox, oy, ow, oh);
    ctx.fillStyle = '#1e293b';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(o.type === 'porte' ? '🚪' : '🪟', ox + ow / 2, oy + oh / 2 + 4);
    ctx.textAlign = 'left';
  });

  // --- LABEL PIGNON ---
  if (res.type === 'pignon') {
    ctx.fillStyle = '#64748b';
    ctx.font = '10px sans-serif';
    var hMinLbl = Math.min(res.hg, res.hd);
    ctx.fillText('Pignon', mL + 6, yBase - hMinLbl * sc - (res.hc - hMinLbl) * sc / 2);
  }

  // --- CONTOUR GÉNÉRAL ---
  ctx.strokeStyle = '#1e3a8a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  if (res.type === 'facade') {
    ctx.moveTo(mL,          yBase - hgPx);
    ctx.lineTo(mL + largPx, yBase - hdPx);
    ctx.lineTo(mL + largPx, yBase);
    ctx.lineTo(mL,          yBase);
  } else {
    var xPtrPx2   = largPx / 2;
    var xPlatGpx2 = res.largHG * sc;
    var xPlatDpx2 = (res.larg - res.largHD) * sc;
    // mur gauche
    ctx.moveTo(mL, yBase);
    ctx.lineTo(mL, yBase - res.hg * sc);
    // pente gauche (avec plat si largHG > 0)
    if (res.largHG > 0) ctx.lineTo(mL + xPlatGpx2, yBase - res.hg * sc);
    ctx.lineTo(mL + xPtrPx2, yBase - res.hc * sc);
    // pente droite (avec plat si largHD > 0)
    if (res.largHD > 0) ctx.lineTo(mL + xPlatDpx2, yBase - res.hd * sc);
    if (res.largHD > 0) ctx.lineTo(mL + largPx, yBase - res.hd * sc);
    // mur droit + base : path separé pour eviter ligne horizontale de fermeture automatique
    ctx.moveTo(mL + largPx, yBase - res.hd * sc);
    ctx.lineTo(mL + largPx, yBase);
    ctx.lineTo(mL, yBase);
  }
  ctx.stroke();

  // --- JOINT DE DILATATION ---
  if (res.nbJD > 0) {
    ctx.strokeStyle = '#ef4444';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    for (var k = 1; k <= res.nbJD; k++) {
      var yJD = yBase - arPx - k * 6000 * sc;
      if (yJD < yPoseTop) break;
      ctx.beginPath();
      ctx.moveTo(mL, yJD);
      ctx.lineTo(mL + largPx, yJD);
      ctx.stroke();
      ctx.fillStyle = '#ef4444';
      ctx.font = '9px sans-serif';
      ctx.fillText('Joint dilatation', mL + 4, yJD - 2);
    }
    ctx.setLineDash([]);
  }

  // --- COTES ---
  ctx.fillStyle = '#475569';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(res.larg + ' mm', mL + largPx / 2, H - 4);
  ctx.save();
  ctx.translate(12, yBase - hgPx / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText(res.hg + ' mm', 0, 0);
  ctx.restore();
  ctx.textAlign = 'left';
}

// ============================================================
//  SÉLECTEUR VISU
// ============================================================
function updateSelectVisu() {
  var sel = document.getElementById('selectVisu');
  var prev = parseInt(sel.value);
  sel.innerHTML = '';
  var hasOne = false;
  facades.forEach(function(f, i) {
    if (resFacades[i]) {
      var opt = document.createElement('option');
      opt.value = i;
      opt.textContent = nomFacade(f);
      sel.appendChild(opt);
      hasOne = true;
    }
  });
  if (!hasOne) {
    sel.innerHTML = '<option value="">— Aucune façade calculée —</option>';
    return;
  }
  if (!isNaN(prev) && resFacades[prev]) {
    sel.value = prev;
  } else {
    sel.value = currentVisu;
  }
}

document.getElementById('selectVisu').addEventListener('change', function() {
  var i = parseInt(this.value);
  if (!isNaN(i) && resFacades[i]) {
    currentVisu = i;
    dessiner(resFacades[i]);
  }
});

// ============================================================
//  TOAST
// ============================================================
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

// ============================================================
//  SAUVEGARDE PROJET (JSON)
// ============================================================
document.getElementById('btnSauv').addEventListener('click', function() {
  var projet = {
    v: 2,
    facades: facades,
    savedAt: new Date().toLocaleDateString('fr-FR')
  };
  var blob = new Blob([JSON.stringify(projet, null, 2)], { type: 'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'calepinage_' + projet.savedAt.replace(/\//g,'-') + '.json';
  a.click();
  showToast('✅ Projet sauvegardé !');
});

// ============================================================
//  CHARGEMENT PROJET (JSON)
// ============================================================
document.getElementById('btnCharg').addEventListener('click', function() {
  document.getElementById('fileCharg').click();
});

document.getElementById('fileCharg').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var p = JSON.parse(ev.target.result);
      if (!p.v) throw new Error('Format invalide');
      if (p.v >= 2 && p.facades) {
        // Format multi-façades v2
        facades = p.facades;
        facadeCounter = facades.reduce(function(m,f){ return Math.max(m, f.num||0); }, 0);
        resFacades = facades.map(function(){ return null; });
        renderFacades();
        showToast('📂 Projet chargé — ' + facades.length + ' façade(s) — ' + (p.savedAt || ''));
      } else {
        // Ancien format v1 → convertir en une façade
        var f = newFacade();
        f.nom = 'Façade importée';
        f.type = p.type === 'trapeze' ? 'facade' : (p.type || 'facade');
        f.larg = parseFloat(p.larg) || 8000;
        f.largHG = parseFloat(p.largHG) || f.larg;
        f.largHD = parseFloat(p.largHD) || f.larg;
        f.hg = parseFloat(p.hg) || 4000;
        f.hd = parseFloat(p.hd) || 4000;
        f.hc = parseFloat(p.hc) || 6000;
        f.lu = parseFloat(p.lu) || 200;
        f.hu = parseFloat(p.hu) || 3000;
        f.joint = parseFloat(p.joint) || 8;
        f.typeMat = p.typeMat || 'composite';
        f.lameAir = parseFloat(p.lameAir) || 25;
        f.antiRongeur = parseFloat(p.antiRongeur) || 300;
        f.zoneVent = p.zoneVent || 'normale';
        f.formatPP = p.formatPP || '25';
        f.ouvertures = p.ouvertures || [];
        facades = [f];
        resFacades = [null];
        renderFacades();
        showToast('📂 Projet v1 chargé et converti');
      }
    } catch(err) {
      alert('Fichier invalide : ' + err.message);
    }
  };
  reader.readAsText(file);
  // Reset input pour pouvoir recharger le même fichier
  this.value = '';
});

//  PDF
// ============================================================
document.getElementById('btnPDF').addEventListener('click', function() {
  var r = resFacades[currentVisu];
  if (!r) { alert('Calculez d\'abord'); return; }
  var canvas = document.getElementById('cvs');
  var imgData = canvas.toDataURL('image/png');
  var pdf = new window.jspdf.jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
  pdf.setFontSize(16);
  pdf.text('Calepinage Pro — ' + r.nom, 14, 14);
  pdf.setFontSize(10);
  pdf.text('Surface : ' + r.sBrute.toFixed(2) + ' m²  |  Utile : ' + r.sUtile.toFixed(2) + ' m²  |  Lames : ' + r.nbTotal, 14, 22);
  var w = 260, h = w * canvas.height / canvas.width;
  pdf.addImage(imgData, 'PNG', 14, 28, w, h);
  pdf.save('calepinage_' + r.nom.replace(/ /g,'_') + '.pdf');
});
