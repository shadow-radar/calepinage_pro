<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calepinage Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;color:#1e293b;padding:12px}
        .header{background:linear-gradient(135deg,#1e3a8a,#3b82f6);color:#fff;padding:20px;border-radius:14px;margin-bottom:16px}
        .header h1{font-size:1.4em}.header p{opacity:.9;font-size:.9em}
        .tabs{display:flex;gap:4px;margin-bottom:16px;background:#fff;padding:5px;border-radius:12px;overflow-x:auto}
        .tab{flex-shrink:0;padding:10px 14px;border:none;background:transparent;border-radius:8px;font-size:.85em;font-weight:500;cursor:pointer;white-space:nowrap}
        .tab:hover{background:#f1f5f9}
        .tab.active{background:#1a56db;color:#fff}
        .tab-content{display:none}
        .tab-content.active{display:block}
        .card{background:#fff;padding:16px;border-radius:10px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
        .card h2{font-size:1.1em;color:#1a56db;margin-bottom:12px}
        .card h3{font-size:1em;margin-bottom:8px}
        .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .input-group{display:flex;flex-direction:column}
        .input-group label{font-size:.8em;color:#64748b;margin-bottom:3px}
        .input-group input,.input-group select{padding:10px;border:2px solid #e2e8f0;border-radius:8px;font-size:.9em}
        .input-group input:focus,.input-group select:focus{outline:none;border-color:#1a56db}
        .radio-group{display:flex;gap:10px;flex-wrap:wrap}
        .radio-group label{display:flex;align-items:center;gap:6px;padding:8px 14px;border:2px solid #e2e8f0;border-radius:8px;font-size:.85em;cursor:pointer}
        .btn-primary,.btn-secondary{padding:12px 20px;border:none;border-radius:8px;font-size:.95em;font-weight:600;cursor:pointer;margin:5px}
        .btn-primary{background:#1a56db;color:#fff}
        .btn-secondary{background:#e2e8f0;color:#1e293b}
        .cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
        .result-card{text-align:center;background:linear-gradient(135deg,#eff6ff,#f0f9ff);padding:12px;border-radius:8px}
        .result-value{font-size:1.4em;font-weight:700;color:#1a56db}
        .canvas-container{width:100%;background:#fff;border-radius:10px;border:1px solid #e2e8f0;overflow:auto}
        #canvasCalepinage{width:100%;display:block;height:auto}
        .legend{display:flex;gap:12px;font-size:.8em;margin-bottom:10px;flex-wrap:wrap}
        .legend-item{display:flex;align-items:center;gap:5px}
        .color-box{width:14px;height:14px;border-radius:3px}
        .color-box.intact{background:#86efac}
        .color-box.decoupe{background:#fbbf24}
        .color-box.chute{background:#fca5a5}
        .color-box.ouverture{background:#94a3b8}
        .color-box.antirongeur{background:#9ca3af}
        table{width:100%;border-collapse:collapse;font-size:.85em}
        th{background:#1a56db;color:#fff;padding:8px;text-align:left}
        td{padding:7px 8px;border-bottom:1px solid #e2e8f0}
        .total-row td{font-weight:700;background:#f1f5f9;border-top:2px solid #1a56db}
        .ouverture-item{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:8px;background:#f8fafc;border-radius:8px;margin-bottom:6px}
        .ouverture-item input{width:50px;padding:6px;border:1px solid #e2e8f0;border-radius:6px;font-size:.8em}
        .viz-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:10px}
        @media(max-width:600px){.grid2{grid-template-columns:1fr}.cards-grid{grid-template-columns:1fr 1fr}}
    </style>
</head>
<body>
    <div class="header"><h1>🏗️ Calepinage Pro</h1><p>Bardage & Panneaux - Outil de calcul et plan</p></div>
    <div class="tabs">
        <button class="tab active" data-tab="saisie">📐 Saisie</button>
        <button class="tab" data-tab="visu">🎨 Visu 2D</button>
        <button class="tab" data-tab="metre">📊 Métré</button>
    </div>
    <div id="tab-saisie" class="tab-content active">
        <div class="card"><h2>Type de surface</h2><div class="radio-group"><label><input type="radio" name="surfaceType" value="facade" checked> Façade</label><label><input type="radio" name="surfaceType" value="pignon"> Pignon</label></div></div>
        <div class="card"><h2>Dimensions (mm)</h2>
            <div class="grid2">
                <div class="input-group"><label>Largeur</label><input type="number" id="largeur" value="8000"></div>
                <div class="input-group" id="hgGroup"><label>Hauteur gauche (mur)</label><input type="number" id="hauteurG" value="4000"></div>
                <div class="input-group" id="hdGroup"><label>Hauteur droite (mur)</label><input type="number" id="hauteurD" value="4000"></div>
                <div class="input-group" id="hcGroup" style="display:none"><label>Hauteur centrale (pointe)</label><input type="number" id="hauteurC" value="6000"></div>
            </div>
        </div>
        <div class="card"><h2>🪟 Ouvertures</h2><div id="listeOuvertures"><p style="color:#94a3b8;font-size:.85em">Aucune</p></div><button class="btn-secondary" id="btnAjoutOuv">+ Ajouter</button></div>
        <div class="card"><h2>📦 Matériau</h2><div class="grid2"><div class="input-group"><label>Type</label><select id="typeMateriau"><option value="composite">Composite</option><option value="fibrociment">Fibrociment</option><option value="metal">Métal</option></select></div><div class="input-group"><label>Largeur lame (mm)</label><input type="number" id="largeurUtile" value="200"></div><div class="input-group"><label>Longueur lame (mm)</label><input type="number" id="hauteurUtile" value="3000"></div><div class="input-group"><label>Joint entre lames (mm)</label><input type="number" id="joint" value="8"></div></div></div>
        <div class="card"><h2>🔧 Accessoires</h2><div class="grid2"><div class="input-group"><label>Lame d'air (mm)</label><input type="number" id="lameAir" value="25"></div><div class="input-group"><label>Hauteur anti-rongeur (mm)</label><input type="number" id="hauteurAntiRongeur" value="300"></div><div class="input-group"><label>Zone vent</label><select id="zoneVent"><option value="normale">Normale</option><option value="forte">Forte</option></select></div></div></div>
        <button class="btn-primary" id="btnCalculer">🔍 Calculer</button>
    </div>
    <div id="tab-visu" class="tab-content">
        <div class="viz-header"><div><h2>🎨 Calepinage</h2><div class="legend"><span class="legend-item"><span class="color-box intact"></span>Entière</span><span class="legend-item"><span class="color-box decoupe"></span>Découpée</span><span class="legend-item"><span class="color-box chute"></span>Chute</span><span class="legend-item"><span class="color-box ouverture"></span>Ouverture</span><span class="legend-item"><span class="color-box antirongeur"></span>Anti-rongeur</span></div></div><button class="btn-primary" id="btnPDF">📄 PDF</button></div>
        <div class="canvas-container"><canvas id="canvasCalepinage"></canvas></div>
    </div>
    <div id="tab-metre" class="tab-content">
        <h2>📊 Métré - Quantités</h2>
        <div class="cards-grid"><div class="result-card"><h3>Surface brute</h3><p class="result-value" id="r_surface">-</p></div><div class="result-card"><h3>Surface utile</h3><p class="result-value" id="r_utile">-</p></div><div class="result-card"><h3>Lames</h3><p class="result-value" id="r_nombre">-</p></div><div class="result-card"><h3>Chutes</h3><p class="result-value" id="r_chute">-</p></div><div class="result-card"><h3>Vis</h3><p class="result-value" id="r_vis">-</p></div><div class="result-card"><h3>Rails</h3><p class="result-value" id="r_rails">-</p></div></div>
        <div class="card"><div id="tableauMetre"></div></div>
    </div>

    <script>
    var resultats = null;
    var ouvertures = [];

    document.querySelectorAll('.tabs .tab').forEach(function(tab) {
        tab.onclick = function() {
            var tn = this.getAttribute('data-tab');
            document.querySelectorAll('.tabs .tab').forEach(function(t) { t.classList.remove('active'); });
            document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
            this.classList.add('active');
            document.getElementById('tab-' + tn).classList.add('active');
            if (tn === 'visu' && resultats) dessiner();
        };
    });

    document.querySelectorAll('input[name="surfaceType"]').forEach(function(r) {
        r.onchange = function() {
            var p = this.value === 'pignon';
            document.getElementById('hcGroup').style.display = p ? 'block' : 'none';
        };
    });

    document.getElementById('btnAjoutOuv').onclick = function() {
        ouvertures.push({ id: Date.now(), type: 'fenetre', x: 0, y: 0, largeur: 1200, hauteur: 1500 });
        afficherOuvertures();
    };

    function afficherOuvertures() {
        var c = document.getElementById('listeOuvertures');
        if (ouvertures.length === 0) { c.innerHTML = '<p style="color:#94a3b8;font-size:.85em">Aucune</p>'; return; }
        c.innerHTML = '';
        ouvertures.forEach(function(o) {
            var div = document.createElement('div');
            div.className = 'ouverture-item';
            div.innerHTML =
                '<select><option value="fenetre"' + (o.type === 'fenetre' ? ' selected' : '') + '>Fenêtre</option><option value="porte"' + (o.type === 'porte' ? ' selected' : '') + '>Porte</option></select>' +
                ' X:<input type="number" value="' + o.x + '" data-id="' + o.id + '" data-champ="x">' +
                ' Y:<input type="number" value="' + o.y + '" data-id="' + o.id + '" data-champ="y">' +
                ' L:<input type="number" value="' + o.largeur + '" data-id="' + o.id + '" data-champ="largeur">' +
                ' H:<input type="number" value="' + o.hauteur + '" data-id="' + o.id + '" data-champ="hauteur">' +
                '<button data-del="' + o.id + '" style="background:#fee2e2;border:none;padding:4px 8px;border-radius:4px">🗑️</button>';
            c.appendChild(div);
        });
        c.querySelectorAll('input').forEach(function(inp) {
            inp.onchange = function() {
                var id = parseInt(this.getAttribute('data-id'));
                var champ = this.getAttribute('data-champ');
                var o = ouvertures.find(function(x) { return x.id === id; });
                if (o) o[champ] = parseFloat(this.value) || 0;
            };
        });
        c.querySelectorAll('select').forEach(function(sel) {
            sel.onchange = function() {
                var id = parseInt(this.parentElement.querySelector('input').getAttribute('data-id'));
                var o = ouvertures.find(function(x) { return x.id === id; });
                if (o) o.type = this.value;
            };
        });
        c.querySelectorAll('button[data-del]').forEach(function(btn) {
            btn.onclick = function() {
                var id = parseInt(this.getAttribute('data-del'));
                ouvertures = ouvertures.filter(function(o) { return o.id !== id; });
                afficherOuvertures();
            };
        });
    }

    document.getElementById('btnCalculer').onclick = function() {
        var type = document.querySelector('input[name="surfaceType"]:checked').value;
        var l = parseFloat(document.getElementById('largeur').value) || 0;
        var hg = parseFloat(document.getElementById('hauteurG').value) || 0;
        var hd = parseFloat(document.getElementById('hauteurD').value) || 0;
        var hc = type === 'pignon' ? (parseFloat(document.getElementById('hauteurC').value) || hg) : hg;

        var lu = parseFloat(document.getElementById('largeurUtile').value) || 1;
        var hu = parseFloat(document.getElementById('hauteurUtile').value) || 1;
        var joint = parseFloat(document.getElementById('joint').value) || 0;
        var lameAir = parseFloat(document.getElementById('lameAir').value) || 0;
        var hauteurAntiRongeur = parseFloat(document.getElementById('hauteurAntiRongeur').value) || 0;
        var zoneVent = document.getElementById('zoneVent').value;

        if (l <= 0 || hg <= 0 || hd <= 0) { alert('Dimensions invalides'); return; }
        if (type === 'pignon' && hc <= 0) { alert('Hauteur centrale invalide'); return; }

        // Surface brute
        var sBrute = type === 'facade' ? (l * hg) / 1000000 : (l * (hg + hd) / 2 + l * (hc - Math.min(hg, hd)) / 2) / 1000000;

        // Ouvertures
        var sOuv = 0;
        ouvertures.forEach(function(o) { sOuv += (o.largeur * o.hauteur) / 1000000; });

        // Hauteur utile (sans anti-rongeur)
        var hauteurMin = Math.min(hg, hd);
        var hauteurUtilePose = Math.max(0, hauteurMin - hauteurAntiRongeur);
        var sUtile = type === 'facade' ?
            (l * hauteurUtilePose) / 1000000 - sOuv :
            (l * hauteurUtilePose) / 1000000 - sOuv;
        sUtile = Math.max(0, sUtile);

        // Nombre de lames
        var nbRangees = Math.ceil(hauteurUtilePose / (lu + joint));
        var lamesParRangee = Math.ceil(l / hu);
        var nbTotal = nbRangees * lamesParRangee;

        // Surface achetée
        var sMatiere = nbTotal * (lu * hu) / 1000000;
        var tauxChute = sMatiere > 0 ? ((sMatiere - sUtile) / sMatiere * 100) : 0;

        // Accessoires
        var perimetre = (l + hg + hd + Math.sqrt(l * l + (hg - hd) * (hg - hd))) / 1000;
        var visParM2 = zoneVent === 'forte' ? 8 : 6;
        var nbVis = Math.ceil(sUtile * visParM2 + perimetre * 4);
        var espaceRails = lameAir <= 20 ? 400 : (lameAir <= 30 ? 500 : 600);
        var nbRails = Math.ceil((hauteurUtilePose / espaceRails) * (l / 3000));
        var mlAntiRongeur = l / 1000;
        var nbJointDilatation = Math.floor(hauteurUtilePose / 6000);
        var mlJointDilatation = (nbJointDilatation + 1) * l / 1000;

        resultats = {
            type: type, sBrute: sBrute, sOuv: sOuv, sUtile: sUtile, sMatiere: sMatiere,
            nbTotal: nbTotal, tauxChute: tauxChute, l: l, hg: hg, hd: hd, hc: hc,
            lu: lu, hu: hu, joint: joint, lameAir: lameAir,
            hauteurAntiRongeur: hauteurAntiRongeur, hauteurUtilePose: hauteurUtilePose,
            nbVis: nbVis, nbRails: nbRails, mlAntiRongeur: mlAntiRongeur,
            mlJointDilatation: mlJointDilatation, nbJointDilatation: nbJointDilatation,
            zoneVent: zoneVent, ouvertures: ouvertures
        };

        document.getElementById('r_surface').textContent = sBrute.toFixed(2) + ' m²';
        document.getElementById('r_utile').textContent = sUtile.toFixed(2) + ' m²';
        document.getElementById('r_nombre').textContent = nbTotal + ' u';
        document.getElementById('r_chute').textContent = tauxChute.toFixed(1) + '%';
        document.getElementById('r_vis').textContent = nbVis + ' u';
        document.getElementById('r_rails').textContent = nbRails + ' u';

        var table = '<table><thead><tr><th>Poste</th><th>Qté</th></tr></thead><tbody>';
        table += '<tr><td><strong>Surface brute</strong></td><td>' + sBrute.toFixed(2) + ' m²</td></tr>';
        table += '<tr><td>Ouvertures</td><td>' + sOuv.toFixed(2) + ' m²</td></tr>';
        table += '<tr><td><strong>Surface utile</strong></td><td><strong>' + sUtile.toFixed(2) + ' m²</strong></td></tr>';
        table += '<tr><td colspan="2" style="background:#e2e8f0;font-weight:600">Lames</td></tr>';
        table += '<tr><td>Lames nécessaires</td><td>' + nbTotal + ' u</td></tr>';
        table += '<tr><td>Chutes</td><td>' + tauxChute.toFixed(1) + '%</td></tr>';
        table += '<tr><td colspan="2" style="background:#e2e8f0;font-weight:600">Accessoires</td></tr>';
        table += '<tr><td>Vis (' + zoneVent + ')</td><td>' + nbVis + ' u</td></tr>';
        table += '<tr><td>Rails 3m</td><td>' + nbRails + ' u</td></tr>';
        table += '<tr><td>Anti-rongeur alu</td><td>' + mlAntiRongeur.toFixed(1) + ' ml</td></tr>';
        table += '<tr><td>Joint de dilatation</td><td>' + mlJointDilatation.toFixed(1) + ' ml</td></tr>';
        table += '</tbody></table>';
        document.getElementById('tableauMetre').innerHTML = table;

        dessiner();
        document.querySelectorAll('.tabs .tab').forEach(function(t) { t.classList.remove('active'); });
        document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
        document.querySelector('[data-tab="visu"]').classList.add('active');
        document.getElementById('tab-visu').classList.add('active');
        };

        function dessiner() {
        var canvas = document.getElementById('canvasCalepinage');
        if (!canvas || !resultats) return;
        var container = canvas.parentElement;
        canvas.width = Math.max(container.clientWidth, 300);
    var hauteurMax = resultats.type === 'pignon' ? Math.max(resultats.hg, resultats.hd, resultats.hc) : resultats.hg;
    var ratio = hauteurMax / resultats.l;
    canvas.height = Math.min(canvas.width * ratio, 600);
    var ctx = canvas.getContext('2d');
    var w = canvas.width;
    var h = canvas.height;
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, w, h);
    var pad = 15;
    var scale = Math.min((w - pad * 2) / resultats.l, (h - pad * 2) / hauteurMax);
    var sx = pad;
    var sy = pad + (h - pad * 2 - hauteurMax * scale) / 2;

    // --- Anti-rongeur ---
    var hauteurAntiPx = resultats.hauteurAntiRongeur * scale;
    var yAnti = sy + (resultats.hg - resultats.hauteurAntiRongeur) * scale;
    ctx.fillStyle = '#d1d5db';
    ctx.fillRect(sx, yAnti, resultats.l * scale, hauteurAntiPx);
    ctx.fillStyle = '#6b7280';
    ctx.font = '10px sans-serif';
    ctx.fillText('Anti-rongeur', sx + 10, yAnti + 15);

    // --- Rectangle (partie basse) ---
    var hauteurMin = Math.min(resultats.hg, resultats.hd);
    var hauteurBardeePx = (hauteurMin - resultats.hauteurAntiRongeur) * scale;
    var nbR = Math.ceil((hauteurMin - resultats.hauteurAntiRongeur) / (resultats.lu + resultats.joint));
    var hR = (resultats.lu + resultats.joint) * scale;

    for (var i = 0; i < Math.min(nbR, 30); i++) {
        var y = sy + i * hR;
        if (y > sy + hauteurBardeePx) break;
        var nbP2 = Math.ceil(resultats.l / resultats.hu);
        var lP = resultats.hu * scale;
        for (var j = 0; j < nbP2; j++) {
            var x = sx + j * lP;
            var reste = resultats.l - j * resultats.hu;
            var lr = Math.min(lP, Math.max(0, reste * scale));
            if (lr <= 0) continue;
            ctx.fillStyle = (reste > resultats.hu * 0.95) ? '#86efac66' : (reste > 0 ? '#fbbf2466' : '#fca5a566');
            ctx.fillRect(x, y, lr, Math.min(hR, hauteurBardeePx - (y - sy)));
            ctx.strokeStyle = '#64748b';
            ctx.lineWidth = 0.5;
            ctx.strokeRect(x, y, lr, Math.min(hR, hauteurBardeePx - (y - sy)));
        }
    }

            // --- Triangle du pignon ---
if (resultats.type === 'pignon') {
    var hauteurMin = Math.min(resultats.hg, resultats.hd);
    var yTriangleBase = sy + hauteurMin * scale;
    var hTriangleGauche = (resultats.hg - hauteurMin) * scale;
    var hTriangleDroite = (resultats.hd - hauteurMin) * scale;
    var hTriangleCentral = (resultats.hc - hauteurMin) * scale;

    // Fond du triangle (gris clair)
    ctx.fillStyle = '#e2e8f0';
    ctx.beginPath();
    // Point de départ : gauche
    ctx.moveTo(sx, yTriangleBase - hTriangleGauche);
    // Pointe : centre
    ctx.lineTo(sx + resultats.l * scale / 2, yTriangleBase - hTriangleCentral);
    // Point d'arrivée : droite
    ctx.lineTo(sx + resultats.l * scale, yTriangleBase - hTriangleDroite);
    // Retour à la base
    ctx.lineTo(sx + resultats.l * scale, yTriangleBase);
    ctx.lineTo(sx, yTriangleBase);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#64748b';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Lames dans le triangle
    var hTriangleMax = Math.max(hTriangleGauche, hTriangleDroite, hTriangleCentral);
    var nbRTriangle = Math.ceil(hTriangleMax / (resultats.lu + resultats.joint));
    var hRTriangle = (resultats.lu + resultats.joint) * scale;

    for (var i2 = 0; i2 < Math.min(nbRTriangle, 20); i2++) {
        var y2 = yTriangleBase - i2 * hRTriangle;
        if (y2 < sy) break;
        var progression = i2 / nbRTriangle;
        var largeurGauche = resultats.l * (1 - progression * (resultats.hg - hauteurMin) / hTriangleMax);
        var largeurDroite = resultats.l * (1 - progression * (resultats.hd - hauteurMin) / hTriangleMax);
        var largeurY2 = (largeurGauche + largeurDroite) / 2;
        var nbP3 = Math.ceil(largeurY2 / resultats.hu);
        var lP2 = resultats.hu * scale;
        var decalageX = (resultats.l * scale - largeurY2 * scale) / 2;
        for (var j2 = 0; j2 < nbP3; j2++) {
            var x2 = sx + decalageX + j2 * lP2;
            var reste2 = largeurY2 - j2 * resultats.hu;
            var lr2 = Math.min(lP2, Math.max(0, reste2 * scale));
            if (lr2 <= 0) continue;
            ctx.fillStyle = (reste2 > resultats.hu * 0.95) ? '#86efac66' : (reste2 > 0 ? '#fbbf2466' : '#fca5a566');
            ctx.fillRect(x2, y2, lr2, Math.min(hRTriangle, yTriangleBase - y2));
            ctx.strokeStyle = '#64748b';
            ctx.lineWidth = 0.5;
            ctx.strokeRect(x2, y2, lr2, Math.min(hRTriangle, yTriangleBase - y2));
        }
    }
}
    
    // --- Ouvertures ---
    resultats.ouvertures.forEach(function(o) {
        ctx.fillStyle = '#94a3b866';
        ctx.fillRect(sx + o.x * scale, sy + o.y * scale, o.largeur * scale, o.hauteur * scale);
        ctx.strokeStyle = '#475569';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(sx + o.x * scale, sy + o.y * scale, o.largeur * scale, o.hauteur * scale);
        ctx.fillStyle = '#1e293b';
        ctx.font = '8px sans-serif';
        ctx.fillText(o.type, sx + o.x * scale + 4, sy + o.y * scale + 12);
    });

    // --- Joint dilatation ---
    ctx.strokeStyle = '#ef4444';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx + resultats.l * scale, sy);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#ef4444';
    ctx.font = '8px sans-serif';
    ctx.fillText('Joint dilatation', sx + 4, sy + 10);

    // --- Cote ---
    ctx.fillStyle = '#334155';
    ctx.font = '10px sans-serif';
    ctx.fillText(resultats.l + ' mm', sx + resultats.l * scale / 2 - 20, sy + hauteurMax * scale + 12);
}

    document.getElementById('btnPDF').onclick = function() {
        if (!resultats) { alert('Faites un calcul d\'abord'); return; }
        var doc = new window.jspdf.jsPDF('p', 'mm', 'a4');
        doc.setFontSize(16);
        doc.setTextColor(26, 86, 219);
        doc.text('CALEPINAGE - Métré', 15, 20);
        doc.setFontSize(10);
        doc.setTextColor(100);
        var y = 30;
        var lignes = [
            'Surface brute: ' + resultats.sBrute.toFixed(2) + ' m²',
            'Surface utile: ' + resultats.sUtile.toFixed(2) + ' m²',
            'Lames: ' + resultats.nbTotal + ' u',
            'Chutes: ' + resultats.tauxChute.toFixed(1) + '%',
            'Vis: ' + resultats.nbVis + ' u',
            'Rails 3m: ' + resultats.nbRails + ' u',
            'Anti-rongeur: ' + resultats.mlAntiRongeur.toFixed(1) + ' ml',
            'Joint dilatation: ' + resultats.mlJointDilatation.toFixed(1) + ' ml'
        ];
        lignes.forEach(function(l) { doc.text(l, 15, y); y += 7; });
        doc.save('calepinage.pdf');
    };

    window.addEventListener('resize', function() {
        if (resultats && document.getElementById('tab-visu').classList.contains('active')) dessiner();
    });
</script>
</body>
</html>
