<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Calepinage Bardage - BNA</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

  <header>
    <img src="icon.svg" alt="Logo BNA" id="logo">
    <h1>Calepinage Bardage - Plan 2D</h1>
  </header>

  <main>
    <section id="params">
      <h2>Paramètres du mur</h2>
      <h2>Murs / Façades</h2>

<select id="mur_select"></select>
<button id="btn_add_mur">Ajouter un mur</button>
<button id="btn_del_mur">Supprimer le mur</button>
<button id="btn_export_pdf">Exporter en PDF</button>
      
      <label>Largeur mur (mm)</label>
      <input type="number" id="mur_largeur" value="6000">

      <label>Hauteur mur (mm)</label>
      <input type="number" id="mur_hauteur" value="2800">

      <label>Largeur panneau (mm)</label>
      <input type="number" id="panneau_largeur" value="300">

      <button id="btn_calcul">Dessiner le plan</button>
    </section>

    <section id="plan">
      <svg id="svg_plan" viewBox="0 0 600 300">
        <g id="layer-mur"></g>
        <g id="layer-panneaux"></g>
        <g id="layer-ouvertures"></g>
        <g id="layer-annotations"></g>
      </svg>
    </section>

    <section id="resultats">
      <h2>Résultats</h2>
      <div id="res_panneaux"></div>
      <div id="res_pertes"></div>
    </section>
  </main>

  <script src="assets/js/script.js"></script>
</body>
</html>
