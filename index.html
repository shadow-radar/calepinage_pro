<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calepinage Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;color:#1e293b;padding:12px}
        .header{background:linear-gradient(135deg,#1e3a8a,#3b82f6);color:#fff;padding:20px;border-radius:14px;margin-bottom:16px}
        .header h1{font-size:1.4em}.header p{opacity:.9;font-size:.9em}
        .tabs{display:flex;gap:4px;margin-bottom:16px;background:#fff;padding:5px;border-radius:12px;overflow-x:auto}
        .tab{flex-shrink:0;padding:10px 14px;border:none;background:transparent;border-radius:8px;font-size:.85em;font-weight:500;cursor:pointer;white-space:nowrap}
        .tab:hover{background:#f1f5f9}
        .tab.active{background:#1a56db;color:#fff}
        .tab-content{display:none}
        .tab-content.active{display:block}
        .card{background:#fff;padding:16px;border-radius:10px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
        .card h2{font-size:1.1em;color:#1a56db;margin-bottom:12px}
        .card h3{font-size:1em;margin-bottom:8px}
        .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .input-group{display:flex;flex-direction:column}
        .input-group label{font-size:.8em;color:#64748b;margin-bottom:3px}
        .input-group input,.input-group select{padding:10px;border:2px solid #e2e8f0;border-radius:8px;font-size:.9em}
        .input-group input:focus,.input-group select:focus{outline:none;border-color:#1a56db}
        .radio-group{display:flex;gap:10px;flex-wrap:wrap}
        .radio-group label{display:flex;align-items:center;gap:6px;padding:8px 14px;border:2px solid #e2e8f0;border-radius:8px;font-size:.85em;cursor:pointer}
        .btn-primary,.btn-secondary{padding:12px 20px;border:none;border-radius:8px;font-size:.95em;font-weight:600;cursor:pointer;margin:5px}
        .btn-primary{background:#1a56db;color:#fff}
        .btn-secondary{background:#e2e8f0;color:#1e293b}
        .cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
        .result-card{text-align:center;background:linear-gradient(135deg,#eff6ff,#f0f9ff);padding:12px;border-radius:8px}
        .result-value{font-size:1.4em;font-weight:700;color:#1a56db}
        .canvas-container{width:100%;background:#fff;border-radius:10px;border:1px solid #e2e8f0;overflow:hidden}
        #canvasCalepinage{width:100%;display:block}
        .legend{display:flex;gap:12px;font-size:.8em;margin-bottom:10px;flex-wrap:wrap}
        .legend-item{display:flex;align-items:center;gap:5px}
        .color-box{width:14px;height:14px;border-radius:3px}
        .color-box.intact{background:#86efac}
        .color-box.decoupe{background:#fbbf24}
        .color-box.chute{background:#fca5a5}
        .color-box.ouverture{background:#94a3b8}
        table{width:100%;border-collapse:collapse;font-size:.85em}
        th{background:#1a56db;color:#fff;padding:8px;text-align:left}
        td{padding:7px 8px;border-bottom:1px solid #e2e8f0}
        .total-row td{font-weight:700;background:#f1f5f9;border-top:2px solid #1a56db}
        .ouverture-item{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:8px;background:#f8fafc;border-radius:8px;margin-bottom:6px}
        .ouverture-item input{width:50px;padding:6px;border:1px solid #e2e8f0;border-radius:6px;font-size:.8em}
        .viz-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:10px}
    </style>
</head>
<body>

    <div class="header">
        <h1>🏗️ Calepinage Pro</h1>
        <p>Bardage & Panneaux</p>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="saisie">📐 Saisie</button>
        <button class="tab" data-tab="visu">🎨 Visu 2D</button>
        <button class="tab" data-tab="metre">📊 Métré</button>
    </div>

    <!-- SAISIE -->
    <div id="tab-saisie" class="tab-content active">
        <div class="card">
            <h2>Type de surface</h2>
            <div class="radio-group">
                <label><input type="radio" name="surfaceType" value="facade" checked> Façade</label>
                <label><input type="radio" name="surfaceType" value="pignon"> Pignon</label>
            </div>
        </div>

        <div class="card">
            <h2>Dimensions (mm)</h2>
            <div class="grid2">
                <div class="input-group"><label>Largeur</label><input type="number" id="largeur" value="8000"></div>
                <div class="input-group"><label>Hauteur gauche</label><input type="number" id="hauteurG" value="6000"></div>
                <div class="input-group" id="largeur2Group" style="display:none"><label>Largeur haute</label><input type="number" id="largeur2" value="3000"></div>
                <div class="input-group" id="hauteurDGroup" style="display:none"><label>Hauteur droite</label><input type="number" id="hauteurD" value="6000"></div>
            </div>
        </div>

        <div class="card">
            <h2>🪟 Ouvertures</h2>
            <div id="listeOuvertures"><p style="color:#94a3b8;font-size:.85em">Aucune</p></div>
            <button class="btn-secondary" id="btnAjoutOuv">+ Ajouter</button>
        </div>

        <div class="card">
            <h2>📦 Matériau</h2>
            <div class="grid2">
                <div class="input-group"><label>Largeur utile (mm)</label><input type="number" id="largeurUtile" value="200"></div>
                <div class="input-group"><label>Longueur (mm)</label><input type="number" id="hauteurUtile" value="3000"></div>
                <div class="input-group"><label>Joint (mm)</label><input type="number" id="joint" value="5"></div>
                <div class="input-group"><label>Prix unitaire (€)</label><input type="number" id="prixUnitaire" value="35" step="0.01"></div>
            </div>
        </div>

        <div class="card">
            <h2>👷 Main d'œuvre</h2>
            <div class="grid2">
                <div class="input-group"><label>Prix pose (€/m²)</label><input type="number" id="prixMO" value="55" step="0.01"></div>
                <div class="input-group"><label>Temps (h/m²)</label><input type="number" id="tempsMO" value="0.8" step="0.1"></div>
            </div>
        </div>

        <button class="btn-primary" id="btnCalculer">🔍 Calculer</button>
    </div>

    <!-- VISU 2D -->
    <div id="tab-visu" class="tab-content">
        <div class="viz-header">
            <div>
                <h2>🎨 Calepinage</h2>
                <div class="legend">
                    <span class="legend-item"><span class="color-box intact"></span>Entière</span>
                    <span class="legend-item"><span class="color-box decoupe"></span>Découpée</span>
                    <span class="legend-item"><span class="color-box chute"></span>Chute</span>
                    <span class="legend-item"><span class="color-box ouverture"></span>Ouverture</span>
                </div>
            </div>
            <button class="btn-primary" id="btnPDF">📄 PDF</button>
        </div>
        <div class="canvas-container"><canvas id="canvasCalepinage"></canvas></div>
    </div>

    <!-- MÉTRÉ -->
    <div id="tab-metre" class="tab-content">
        <h2>📊 Métré</h2>
        <div class="cards-grid">
            <div class="result-card"><h3>Surface brute</h3><p class="result-value" id="r_surface">-</p></div>
            <div class="result-card"><h3>Surface utile</h3><p class="result-value" id="r_utile">-</p></div>
            <div class="result-card"><h3>Éléments</h3><p class="result-value" id="r_nombre">-</p></div>
            <div class="result-card"><h3>Chutes</h3><p class="result-value" id="r_chute">-</p></div>
            <div class="result-card"><h3>Temps</h3><p class="result-value" id="r_temps">-</p></div>
            <div class="result-card"><h3>Prix HT</h3><p class="result-value" id="r_prix">-</p></div>
        </div>
        <div class="card"><div id="tableauMetre"></div></div>
    </div>

    <script>
    console.log('START');

    var resultats = null;
    var ouvertures = [];

    // TABS
    document.querySelectorAll('.tabs .tab').forEach(function(tab){
        tab.onclick = function(){
            var tn = this.getAttribute('data-tab');
            document.querySelectorAll('.tabs .tab').forEach(function(t){t.classList.remove('active')});
            document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active')});
            this.classList.add('active');
            document.getElementById('tab-'+tn).classList.add('active');
        };
    });

    // PIGNON TOGGLE
    document.querySelectorAll('input[name="surfaceType"]').forEach(function(r){
        r.onchange = function(){
            var p = this.value === 'pignon';
            document.getElementById('largeur2Group').style.display = p ? 'block' : 'none';
            document.getElementById('hauteurDGroup').style.display = p ? 'block' : 'none';
        };
    });

    // OUVERTURES
    document.getElementById('btnAjoutOuv').onclick = function(){
        var id = Date.now();
        ouvertures.push({id:id,type:'fenetre',x:0,y:0,largeur:1200,hauteur:1500});
        afficherOuvertures();
    };

    function afficherOuvertures(){
        var c = document.getElementById('listeOuvertures');
        if(ouvertures.length===0){c.innerHTML='<p style="color:#94a3b8;font-size:.85em">Aucune</p>';return;}
        c.innerHTML = '';
        ouvertures.forEach(function(o){
            var div = document.createElement('div');
            div.className = 'ouverture-item';
            div.innerHTML = 
                '<select><option value="fenetre"'+(o.type==='fenetre'?' selected':'')+'>Fenêtre</option><option value="porte"'+(o.type==='porte'?' selected':'')+'>Porte</option></select>'+
                ' X:<input type="number" value="'+o.x+'" data-id="'+o.id+'" data-champ="x">'+
                ' Y:<input type="number" value="'+o.y+'" data-id="'+o.id+'" data-champ="y">'+
                ' L:<input type="number" value="'+o.largeur+'" data-id="'+o.id+'" data-champ="largeur">'+
                ' H:<input type="number" value="'+o.hauteur+'" data-id="'+o.id+'" data-champ="hauteur">'+
                '<button data-del="'+o.id+'" style="background:#fee2e2;border:none;padding:4px 8px;border-radius:4px">🗑️</button>';
            c.appendChild(div);
        });
        c.querySelectorAll('input').forEach(function(inp){
            inp.onchange = function(){
                var id = parseInt(this.getAttribute('data-id'));
                var champ = this.getAttribute('data-champ');
                var o = ouvertures.find(function(x){return x.id===id});
                if(o) o[champ] = parseFloat(this.value)||0;
            };
        });
        c.querySelectorAll('select').forEach(function(sel){
            sel.onchange = function(){
                var id = parseInt(this.parentElement.querySelector('input').getAttribute('data-id'));
                var o = ouvertures.find(function(x){return x.id===id});
                if(o) o.type = this.value;
            };
        });
        c.querySelectorAll('button[data-del]').forEach(function(btn){
            btn.onclick = function(){
                var id = parseInt(this.getAttribute('data-del'));
                ouvertures = ouvertures.filter(function(o){return o.id!==id});
                afficherOuvertures();
            };
        });
    }

    // CALCUL
    document.getElementById('btnCalculer').onclick = function(){
        var type = document.querySelector('input[name="surfaceType"]:checked').value;
        var l = parseFloat(document.getElementById('largeur').value)||0;
        var hg = parseFloat(document.getElementById('hauteurG').value)||0;
        var l2 = type==='pignon' ? (parseFloat(document.getElementById('largeur2').value)||l) : l;
        var hd = type==='pignon' ? (parseFloat(document.getElementById('hauteurD').value)||hg) : hg;
        var lu = parseFloat(document.getElementById('largeurUtile').value)||1;
        var hu = parseFloat(document.getElementById('hauteurUtile').value)||1;
        var joint = parseFloat(document.getElementById('joint').value)||0;
        var pu = parseFloat(document.getElementById('prixUnitaire').value)||0;
        var pmo = parseFloat(document.getElementById('prixMO').value)||0;
        var tmo = parseFloat(document.getElementById('tempsMO').value)||0;

        if(l<=0||hg<=0){alert('Dimensions invalides');return;}

        var sBrute = type==='facade' ? (l*hg)/1000000 : ((l+l2)*hg/2)/1000000;
        var sOuv = 0;
        ouvertures.forEach(function(o){sOuv += (o.largeur*o.hauteur)/1000000;});
        var sUtile = Math.max(0, sBrute - sOuv);
        var nbRangees = Math.ceil(hg/(lu+joint));
        var lamesParRangee = Math.ceil(l/hu);
        var nbTotal = nbRangees * lamesParRangee;
        var sMatiere = nbTotal * (lu*hu)/1000000;
        var tauxChute = sMatiere>0 ? ((sMatiere-sUtile)/sMatiere*100) : 0;

        var perimetre = (l + hg) * 2 / 1000;
        var nbVis = Math.ceil(sUtile * 8 + perimetre * 4);
        var nbRails = Math.ceil((hg / 600) * (l / 3000));
        var mlDepart = l / 1000;
        var mlFinition = perimetre;
        var mlEtancheite = sUtile * 1.5;
        var prixVis = nbVis * 0.15;
        var prixRails = nbRails * 18;
        var prixDepart = mlDepart * 12;
        var prixFinition = mlFinition * 15;
        var prixEtancheite = mlEtancheite * 3.50;
        var prixAccessoires = prixVis + prixRails + prixDepart + prixFinition + prixEtancheite;

        var prixMat = nbTotal * pu;
        var prixMOTotal = sUtile * pmo;
        var totalHT = prixMat + prixAccessoires + prixMOTotal;
        var totalTTC = totalHT * 1.2;
        var tempsTotal = sUtile * tmo;

        resultats = {
            sBrute:sBrute, sOuv:sOuv, sUtile:sUtile, sMatiere:sMatiere,
            nbTotal:nbTotal, tauxChute:tauxChute,
            l:l, hg:hg, l2:l2, hd:hd, lu:lu, hu:hu, joint:joint,
            prixMat:prixMat, prixMO:prixMOTotal, totalHT:totalHT, totalTTC:totalTTC,
            tempsTotal:tempsTotal,
            nbVis:nbVis, nbRails:nbRails, mlDepart:mlDepart, mlFinition:mlFinition, mlEtancheite:mlEtancheite,
            prixVis:prixVis, prixRails:prixRails, prixDepart:prixDepart, prixFinition:prixFinition, prixEtancheite:prixEtancheite, prixAccessoires:prixAccessoires
        };

        document.getElementById('r_surface').textContent = sBrute.toFixed(2)+' m²';
        document.getElementById('r_utile').textContent = sUtile.toFixed(2)+' m²';
        document.getElementById('r_nombre').textContent = nbTotal;
        document.getElementById('r_chute').textContent = tauxChute.toFixed(1)+'%';
        document.getElementById('r_temps').textContent = tempsTotal.toFixed(1)+' h';
        document.getElementById('r_prix').textContent = totalHT.toFixed(2)+' €';

        document.getElementById('tableauMetre').innerHTML = 
            '<table><thead><tr><th>Poste</th><th>Qté</th><th>Total HT</th></tr></thead><tbody>'+
            '<tr><td>Surface brute</td><td>'+sBrute.toFixed(2)+' m²</td><td>-</td></tr>'+
            '<tr><td>Ouvertures</td><td>'+sOuv.toFixed(2)+' m²</td><td>-</td></tr>'+
            '<tr><td><strong>Surface utile</strong></td><td><strong>'+sUtile.toFixed(2)+' m²</strong></td><td>-</td></tr>'+
            '<tr><td colspan="3" style="background:#e2e8f0;font-weight:600">📦 Matériau principal</td></tr>'+
            '<tr><td>Éléments</td><td>'+nbTotal+' unités</td><td>'+prixMat.toFixed(2)+' €</td></tr>'+
            '<tr><td>Chutes</td><td>'+tauxChute.toFixed(1)+'%</td><td>-</td></tr>'+
            '<tr><td colspan="3" style="background:#e2e8f0;font-weight:600">🔩 Accessoires</td></tr>'+
            '<tr><td>Vis auto-perceuses</td><td>'+nbVis+' unités</td><td>'+prixVis.toFixed(2)+' €</td></tr>'+
            '<tr><td>Rails intermédiaires 3m</td><td>'+nbRails+' barres</td><td>'+prixRails.toFixed(2)+' €</td></tr>'+
            '<tr><td>Profil de départ</td><td>'+mlDepart.toFixed(1)+' ml</td><td>'+prixDepart.toFixed(2)+' €</td></tr>'+
            '<tr><td>Profil de finition</td><td>'+mlFinition.toFixed(1)+' ml</td><td>'+prixFinition.toFixed(2)+' €</td></tr>'+
            '<tr><td>Bande d\'étanchéité</td><td>'+mlEtancheite.toFixed(1)+' ml</td><td>'+prixEtancheite.toFixed(2)+' €</td></tr>'+
            '<tr><td colspan="3" style="background:#e2e8f0;font-weight:600">👷 Main d\'œuvre</td></tr>'+
            '<tr><td>Temps de pose</td><td>'+tempsTotal.toFixed(1)+' h</td><td>'+prixMOTotal.toFixed(2)+' €</td></tr>'+
            '<tr class="total-row"><td><strong>TOTAL HT</strong></td><td></td><td><strong>'+totalHT.toFixed(2)+' €</strong></td></tr>'+
            '<tr class="total-row"><td><strong>TOTAL TTC</strong></td><td></td><td><strong>'+totalTTC.toFixed(2)+' €</strong></td></tr>'+
            '</tbody></table>';

        dessiner();
        document.querySelectorAll('.tabs .tab').forEach(function(t){t.classList.remove('active')});
        document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active')});
        document.querySelector('[data-tab="visu"]').classList.add('active');
        document.getElementById('tab-visu').classList.add('active');
    };

    function dessiner(){
        var canvas = document.getElementById('canvasCalepinage');
        if(!canvas||!resultats)return;
        var c = canvas.parentElement;
        canvas.width = Math.max(c.clientWidth,300);
        var ratio = resultats.hg/resultats.l;
        canvas.height = Math.min(canvas.width*ratio,500);
        var ctx = canvas.getContext('2d');
        var w = canvas.width, h = canvas.height;
        ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);
        var pad=15;
        var scale=Math.min((w-pad*2)/resultats.l,(h-pad*2)/resultats.hg);
        var sx=pad,sy=pad,sw=resultats.l*scale,sh=resultats.hg*scale;

        var isPignon = document.querySelector('input[name="surfaceType"]:checked').value === 'pignon';
        var l2 = resultats.l2 || resultats.l;

        if(isPignon){
            var ratioHaut = l2 / resultats.l;
            var decalageX = sw * (1 - ratioHaut) / 2;
            
            ctx.fillStyle='#e2e8f0';
            ctx.beginPath();
            ctx.moveTo(sx, sy+sh);
            ctx.lineTo(sx+sw, sy+sh);
            ctx.lineTo(sx+sw-decalageX, sy);
            ctx.lineTo(sx+decalageX, sy);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle='#64748b';ctx.lineWidth=2;ctx.stroke();

            ouvertures.forEach(function(o){
                ctx.fillStyle='#cbd5e1';
                ctx.fillRect(sx+o.x*scale, sy+o.y*scale, o.largeur*scale, o.hauteur*scale);
                ctx.strokeStyle='#94a3b8';ctx.lineWidth=1;
                ctx.strokeRect(sx+o.x*scale, sy+o.y*scale, o.largeur*scale, o.hauteur*scale);
            });

            var nbR=Math.ceil(resultats.hg/(resultats.lu+resultats.joint));
            var hR=(resultats.lu+resultats.joint)*scale;
            for(var i=0;i<Math.min(nbR,20);i++){
                var y=sy+i*hR;
                var ratioY = (resultats.hg - (i*(resultats.lu+resultats.joint))) / resultats.hg;
                var largeurY = l2 + (resultats.l - l2) * ratioY;
                var decalY = (resultats.l - largeurY) / 2 * scale;
                
                var nbP=Math.ceil(largeurY/resultats.hu);
                var lP=resultats.hu*scale;
                for(var j=0;j<nbP;j++){
                    var x=sx+decalY+j*lP;
                    var reste=largeurY-j*resultats.hu;
                    var lr=Math.min(lP,reste*scale);
                    if(lr<=0)continue;
                    ctx.fillStyle=reste>resultats.hu*0.9?'#86efac66':reste>0?'#fbbf2466':'#fc
