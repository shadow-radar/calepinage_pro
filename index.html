<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calepinage - Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
        button { padding: 15px 25px; margin: 10px; font-size: 18px; border: none; border-radius: 8px; background: #1a56db; color: white; }
        .card { background: white; padding: 20px; border-radius: 10px; margin: 15px 0; }
        input, select { padding: 10px; margin: 5px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; }
        .result { font-size: 20px; font-weight: bold; color: #1a56db; margin: 10px 0; }
    </style>
</head>
<body>

    <h2>🏗️ Calepinage Test</h2>
    
    <div class="card">
        <h3>Dimensions surface (mm)</h3>
        <input type="number" id="largeur" value="8000" placeholder="Largeur">
        <input type="number" id="hauteur" value="6000" placeholder="Hauteur">
    </div>

    <div class="card">
        <h3>Matériau</h3>
        <input type="number" id="largeurLame" value="200" placeholder="Largeur lame">
        <input type="number" id="hauteurLame" value="3000" placeholder="Longueur lame">
    </div>

    <button onclick="calculer()">🔍 Calculer</button>
    
    <div class="card">
        <h3>Résultat</h3>
        <p>Surface : <span id="surface" class="result">-</span> m²</p>
        <p>Nombre de lames : <span id="nbLames" class="result">-</span></p>
    </div>

    <script>
        function calculer() {
            var largeur = parseFloat(document.getElementById('largeur').value);
            var hauteur = parseFloat(document.getElementById('hauteur').value);
            var largeurLame = parseFloat(document.getElementById('largeurLame').value);
            var hauteurLame = parseFloat(document.getElementById('hauteurLame').value);
            
            var surface = (largeur * hauteur) / 1000000;
            var nbLames = Math.ceil(hauteur / largeurLame) * Math.ceil(largeur / hauteurLame);
            
            document.getElementById('surface').textContent = surface.toFixed(2);
            document.getElementById('nbLames').textContent = nbLames;
        }
    </script>

</body>
</html>
