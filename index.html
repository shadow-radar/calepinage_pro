<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Calepinage bardage - BNA</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <header>
    <h1>Calepinage bardage - Plan 2D</h1>
  </header>

  <main>
    <section id="params">
      <!-- Ici tu remets tes inputs (largeur, hauteur, type panneau, etc.) -->
      <label>Largeur mur (mm)</label>
      <input type="number" id="mur_largeur" value="6000">

      <label>Hauteur mur (mm)</label>
      <input type="number" id="mur_hauteur" value="2800">

      <button id="btn_calcul">Calculer & dessiner</button>
    </section>

    <section id="plan">
      <svg id="svg_plan" viewBox="0 0 600 300">
        <!-- Mur, panneaux, ouvertures seront ajoutés en JS -->
        <g id="layer-mur"></g>
        <g id="layer-panneaux"></g>
        <g id="layer-ouvertures"></g>
        <g id="layer-annotations"></g>
      </svg>
    </section>

    <section id="resultats">
      <h2>Résultats</h2>
      <div id="res_panneaux"></div>
      <div id="res_pertes"></div>
    </section>
  </main>

  <script src="assets/js/script.js"></script>
</body>
</html>
